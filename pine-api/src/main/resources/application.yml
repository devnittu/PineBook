server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: pine-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pinebook}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# Python AI Service
ai:
  service:
    base-url: ${AI_SERVICE_BASE_URL:http://localhost:8000}
    timeout-ms: ${AI_SERVICE_TIMEOUT_MS:5000}

# Async thread pool
async:
  core-pool-size: 4
  max-pool-size: 8
  queue-capacity: 100

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.pinebook: DEBUG
  file:
    name: logs/app.log

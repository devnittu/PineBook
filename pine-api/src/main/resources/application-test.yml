# Test profile — use H2 in-memory DB so no real PostgreSQL is needed
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

# Stub out env-required properties so context loads cleanly
ai:
  service:
    base-url: http://localhost:9999
    timeout-ms: 1000

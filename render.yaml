# Render deployment configuration for PineBook
# Docs: https://render.com/docs/yaml-spec

services:

  # ── React Frontend (Static Site) ──────────────────────────────────────────
  - type: web
    name: pine-web
    runtime: static
    rootDir: pine-web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_USE_MOCK
        value: "false"

  # ── Python FastAPI AI Service ──────────────────────────────────────────────
  - type: web
    name: pine-ai
    runtime: python
    region: oregon
    plan: free
    rootDir: pine-ai
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FAISS_INDEX_PATH
        value: data/faiss.index
      - key: FAISS_META_PATH
        value: data/faiss_meta.json
      - key: MODEL_NAME
        value: all-MiniLM-L6-v2
      - key: TOP_K
        value: "5"
      - key: LOG_LEVEL
        value: INFO
    healthCheckPath: /health

  # ── Spring Boot API Gateway (Docker) ──────────────────────────────────────
  - type: web
    name: pine-api
    runtime: docker
    region: oregon
    plan: free
    rootDir: pine-api
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: AI_SERVICE_BASE_URL
        fromService:
          type: web
          name: pine-ai
          property: host
      - key: AI_SERVICE_TIMEOUT_MS
        value: "10000"
      - key: SERVER_PORT
        value: "8080"
    healthCheckPath: /actuator/health

# Render deployment configuration for PineBook
# Docs: https://render.com/docs/yaml-spec
# Deploy via: Render Dashboard → New → Blueprint → connect this repo

databases:

  # ── Managed PostgreSQL (free tier) ────────────────────────────────────────
  - name: pinebook-db
    region: oregon
    plan: free
    databaseName: pinebook
    user: pinebook

services:

  # ── React Frontend (Static Site) ──────────────────────────────────────────
  - type: web
    name: pine-web
    runtime: static
    region: oregon
    rootDir: pine-web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_USE_MOCK
        value: "false"
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: pine-api
          property: hostWithScheme

  # ── Python FastAPI AI Service ──────────────────────────────────────────────
  - type: web
    name: pine-ai
    runtime: python
    region: oregon
    plan: free
    rootDir: pine-ai
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pinebook-db
          property: connectionString
      - key: FAISS_INDEX_PATH
        value: data/faiss.index
      - key: FAISS_META_PATH
        value: data/faiss_meta.json
      - key: MODEL_NAME
        value: all-MiniLM-L6-v2
      - key: TOP_K
        value: "5"
      - key: LOG_LEVEL
        value: INFO
    healthCheckPath: /ready

  # ── Spring Boot API Gateway (Docker) ──────────────────────────────────────
  - type: web
    name: pine-api
    runtime: docker
    region: oregon
    plan: free
    rootDir: pine-api
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DB_URL
        fromDatabase:
          name: pinebook-db
          property: jdbcConnectionString
      - key: DB_USERNAME
        fromDatabase:
          name: pinebook-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: pinebook-db
          property: password
      - key: AI_SERVICE_BASE_URL
        fromService:
          type: web
          name: pine-ai
          property: hostWithScheme
      - key: AI_SERVICE_TIMEOUT_MS
        value: "10000"
      - key: SERVER_PORT
        value: "8080"
    healthCheckPath: /actuator/health
